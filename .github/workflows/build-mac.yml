# Build Detector.app for macOS arm64 (Apple Silicon)
#
# Triggers:
#   - Push to main  → build artifact (downloadable from Actions tab, 14 days)
#   - Push a tag v*  → build + create GitHub Release with .zip attached
#   - Manual dispatch → build artifact
#
# Signing: ad-hoc (no Apple Developer account needed)
# Recipients run: xattr -dr com.apple.quarantine /Applications/Detector.app

name: Build macOS arm64

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    name: Build (macOS arm64)
    runs-on: macos-15    # Apple Silicon runner, pinned

    steps:
      # ── Checkout ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js + npm cache ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ── Cache Electron binary (~120MB) ──
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-${{ runner.arch }}-

      # ── Cache electron-builder ──
      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: eb-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: eb-${{ runner.os }}-${{ runner.arch }}-

      # ── Install dependencies ──
      - name: Install dependencies
        run: npm ci

      # ── Prepare app icons (sips + iconutil, macOS-only) ──
      - name: Prepare icons
        run: |
          ICON_SOURCE="Asset/Icon.png"
          ICONSET_DIR="build/icon.iconset"
          mkdir -p build
          rm -rf "$ICONSET_DIR" && mkdir -p "$ICONSET_DIR"

          sips -z 16   16   "$ICON_SOURCE" --out "$ICONSET_DIR/icon_16x16.png"      >/dev/null
          sips -z 32   32   "$ICON_SOURCE" --out "$ICONSET_DIR/icon_16x16@2x.png"   >/dev/null
          sips -z 32   32   "$ICON_SOURCE" --out "$ICONSET_DIR/icon_32x32.png"      >/dev/null
          sips -z 64   64   "$ICON_SOURCE" --out "$ICONSET_DIR/icon_32x32@2x.png"   >/dev/null
          sips -z 128  128  "$ICON_SOURCE" --out "$ICONSET_DIR/icon_128x128.png"    >/dev/null
          sips -z 256  256  "$ICON_SOURCE" --out "$ICONSET_DIR/icon_128x128@2x.png" >/dev/null
          sips -z 256  256  "$ICON_SOURCE" --out "$ICONSET_DIR/icon_256x256.png"    >/dev/null
          sips -z 512  512  "$ICON_SOURCE" --out "$ICONSET_DIR/icon_256x256@2x.png" >/dev/null
          sips -z 512  512  "$ICON_SOURCE" --out "$ICONSET_DIR/icon_512x512.png"    >/dev/null
          sips -z 1024 1024 "$ICON_SOURCE" --out "$ICONSET_DIR/icon_512x512@2x.png" >/dev/null

          iconutil -c icns "$ICONSET_DIR" -o "build/icon.icns"
          sips -z 64 64 "$ICON_SOURCE" --out "build/iconTemplate.png" >/dev/null

      # ── Build (electron-vite) ──
      - name: Build
        run: npm run build

      # ── Package (electron-builder, ad-hoc signed, zip) ──
      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          npx electron-builder --mac zip \
            --arm64 \
            -c.mac.identity="-" \
            -c.mac.icon="build/icon.icns" \
            -c.artifactName='${productName}-${version}-mac-arm64.${ext}' \
            -c.electronVersion="$(node -p "require('electron/package.json').version")"

      # ── List output ──
      - name: List dist
        run: ls -lah dist/

      # ── Upload artifact (every build) ──
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Detector-mac-arm64
          path: dist/*.zip
          retention-days: 14
          if-no-files-found: error

      # ── Create GitHub Release (only on tag push) ──
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
